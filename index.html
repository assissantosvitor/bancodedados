<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Mission - Washington Engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-dark: #020205;
            --nasa-blue: #00f2fe;
            --earth-blue: #0077be;
            --earth-green: #228b22;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--space-dark);
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        /* Estrelas com tamanhos diferentes */
        #stars-container { position: absolute; width: 100%; height: 100%; }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Planeta Terra Detalhado */
        .earth-container {
            position: absolute;
            bottom: -250px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }

        .earth {
            width: 800px;
            height: 800px;
            background: #004d66 url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Terra_cl_clouds.jpg/600px-Terra_cl_clouds.jpg');
            background-size: cover;
            border-radius: 50%;
            box-shadow: inset -20px -20px 50px #000, 0 0 40px rgba(0, 242, 254, 0.4);
            animation: rotateEarth 100s linear infinite;
        }

        @keyframes rotateEarth {
            from { background-position: 0 0; }
            to { background-position: 1600px 0; }
        }

        /* Atmosfera */
        .atmosphere {
            position: absolute;
            top: -10px; left: -10px;
            width: 820px; height: 820px;
            border-radius: 50%;
            box-shadow: 0 -15px 50px rgba(0, 242, 254, 0.3);
            pointer-events: none;
        }

        /* Foguete em CSS */
        .rocket-container {
            position: absolute;
            bottom: 300px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .rocket {
            width: 40px;
            height: 80px;
            background: #e0e0e0;
            border-radius: 50% 50% 10px 10px;
            position: relative;
            border-bottom: 5px solid #a0a0a0;
        }

        /* Janela do Foguete */
        .rocket::before {
            content: '';
            position: absolute;
            top: 20px; left: 10px;
            width: 20px; height: 20px;
            background: #333;
            border: 3px solid var(--nasa-blue);
            border-radius: 50%;
        }

        /* Aletas Laterais */
        .fin {
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 30px;
            background: #cc0000;
            z-index: -1;
        }
        .fin-left { left: -15px; border-radius: 100% 0 0 0; }
        .fin-right { right: -15px; border-radius: 0 100% 0 0; }

        /* Chama de Decolagem */
        .fire {
            display: none;
            width: 20px;
            height: 60px;
            background: linear-gradient(to bottom, #ff4e50, #f9d423, transparent);
            border-radius: 50%;
            filter: blur(5px);
            margin-top: -5px;
            animation: burn 0.1s infinite alternate;
        }

        @keyframes burn {
            from { height: 50px; opacity: 0.8; transform: scaleX(1); }
            to { height: 80px; opacity: 1; transform: scaleX(1.3); }
        }

        /* Botão de Comando */
        .btn-launch {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--nasa-blue);
            color: var(--nasa-blue);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 3px;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .btn-launch:hover {
            background: var(--nasa-blue);
            color: black;
            box-shadow: 0 0 30px var(--nasa-blue);
        }

        /* Animações de lançamento */
        .shaking { animation: shake 0.1s infinite; }
        .takeoff { animation: lift 2.5s ease-in forwards; }

        @keyframes shake {
            0% { transform: translateX(-50%) translate(1px, 1px); }
            50% { transform: translateX(-50%) translate(-1px, -1px); }
        }

        @keyframes lift {
            to { transform: translateX(-50%) translateY(-130vh) scale(0.3); opacity: 0; }
        }

        .dev-tag {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            letter-spacing: 4px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="dev-tag">CHIEF ENGINEER: WASHINGTON</div>
    <div id="stars-container"></div>

    <div class="earth-container">
        <div class="atmosphere"></div>
        <div class="earth"></div>
    </div>

    <div class="rocket-container" id="missionShip">
        <div class="rocket">
            <div class="fin fin-left"></div>
            <div class="fin fin-right"></div>
        </div>
        <div class="fire" id="engineFire"></div>
        
        <button class="btn-launch" id="launchBtn" onclick="startSequence()">DECOLAR</button>
    </div>

    <script>
        // Criar estrelas de tamanhos variados
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = (Math.random() * 3) + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
            container.appendChild(star);
        }

        function startSequence() {
            const ship = document.getElementById('missionShip');
            const fire = document.getElementById('engineFire');
            const btn = document.getElementById('launchBtn');

            btn.style.display = 'none'; // Esconde o botão após clicar
            fire.style.display = 'block'; // Liga o motor
            ship.classList.add('shaking'); // Começa a tremer

            setTimeout(() => {
                ship.classList.remove('shaking');
                ship.classList.add('takeoff'); // Decola!

                setTimeout(() => {
                    window.location.href = "https://www.nasa.gov";
                }, 2000);
            }, 1500);
        }
    </script>
</body>
</html>
