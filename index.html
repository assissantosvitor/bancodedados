<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo Colorido</title>
    <style>
        /* Aqui é onde a mágica das cores acontece */
        body {
            background-color: #282c34; /* Um cinza escuro moderno */
            color: white;              /* Cor do texto geral */
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;            /* Faz o conteúdo ficar centralizado na tela toda */
            margin: 0;
        }

        h1 {
            color: #61dafb;           /* Um azul brilhante */
            font-size: 50px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        p {
            color: #ffb7b7;           /* Um tom de rosa pastel */
            font-size: 20px;
            font-style: italic;
        }

        .botao {
            background-color: #4CAF50; /* Verde */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>Olá, Mundo!</h1>
    <p>Agora meu código está cheio de vida e cores.</p>
    
    <button class="botao">Clique aqui (só de enfeite)</button>

</body>
</html>,
