<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Olá Mundo + Buraco Negro</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #0a0a0a 0%, #000000 70%);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Buraco negro */
    .black-hole {
      position: absolute;
      width: 380px;
      height: 380px;
      background: radial-gradient(circle at 40% 40%, #000000 40%, #0a0015 70%, #000000 100%);
      border-radius: 50%;
      box-shadow: 
        inset 0 0 120px #000000,
        0 0 180px rgba(80, 0, 180, 0.4),
        0 0 300px rgba(40, 0, 120, 0.25);
      z-index: 1;
      animation: pulse 12s infinite alternate ease-in-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1.00); opacity: 0.92; }
      100% { transform: scale(1.06); opacity: 0.98; }
    }

    .btn {
      position: relative;
      z-index: 2;
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 18px 42px;
      font-size: 22px;
      font-weight: 700;
      text-transform: lowercase;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 
        0 6px 25px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.08) inset;
      transition: all 0.3s ease;
      letter-spacing: 1.2px;
    }

    .btn:hover {
      transform: translateY(-4px) scale(1.06);
      box-shadow: 
        0 12px 40px rgba(0,0,0,0.7),
        0 0 0 2px rgba(255,255,255,0.15) inset;
      background: #f0f0f0;
    }

    .btn:active {
      transform: translateY(-1px) scale(0.98);
    }
  </style>
</head>
<body>

  <div class="black-hole"></div>
  <button class="btn">olá mundo</button>

</body>
</html>
