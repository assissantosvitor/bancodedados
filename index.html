<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA - Deep Space Mission</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --nasa-blue: #00f2fe;
            --fire-orange: #ff4e50;
            --fire-yellow: #f9d423;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #020205;
            font-family: 'Share Tech Mono', monospace;
            color: var(--nasa-blue);
        }

        /* Fundo de Nebulosa */
        .nebula {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 242, 254, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(255, 78, 80, 0.05) 0%, transparent 40%);
            z-index: 0;
        }

        /* Estrelas */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--d) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 10px white; }
        }

        /* HUD - Interface de Dados */
        .hud {
            position: absolute;
            width: 100%; height: 100%;
            border: 20px solid rgba(0, 242, 254, 0.03);
            box-sizing: border-box;
            pointer-events: none;
            z-index: 5;
        }

        .data-panel {
            position: absolute;
            top: 40px; left: 40px;
            font-size: 14px;
            text-transform: uppercase;
            border-left: 2px solid var(--nasa-blue);
            padding-left: 10px;
        }

        /* Planeta com Anéis */
        .saturn {
            position: absolute;
            top: 15%; right: 10%;
            width: 80px; height: 80px;
            background: radial-gradient(circle at 30% 30%, #ffd194, #704214);
            border-radius: 50%;
            z-index: 1;
        }

        .saturn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 160px; height: 20px;
            border: 4px solid rgba(210, 180, 140, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotateX(75deg) rotateY(15deg);
        }

        /* Botão e Propulsão */
        .launch-center {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        #countdown {
            font-family: 'Orbitron', sans-serif;
            font-size: 80px;
            height: 100px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--nasa-blue);
            opacity: 0;
        }

        .btn-launch {
            font-family: 'Orbitron', sans-serif;
            padding: 30px 80px;
            font-size: 30px;
            background: transparent;
            border: 3px solid var(--nasa-blue);
            color: var(--nasa-blue);
            border-radius: 0;
            cursor: pointer;
            letter-spacing: 10px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-launch:hover {
            background: rgba(0, 242, 254, 0.1);
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.4), inset 0 0 20px rgba(0, 242, 254, 0.2);
        }

        /* Efeito de Fogo e Fumaça */
        .smoke {
            position: absolute;
            bottom: -50px; left: 50%;
            width: 10px; height: 10px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }

        .fire-trail {
            display: none;
            position: absolute;
            bottom: -120px; left: 50%;
            transform: translateX(-50%);
            width: 60px; height: 150px;
            background: linear-gradient(to bottom, var(--fire-orange), var(--fire-yellow), transparent);
            filter: blur(15px);
            border-radius: 50%;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            from { transform: translateX(-50%) scaleX(0.9); opacity: 0.8; }
            to { transform: translateX(-50%) scaleX(1.1); opacity: 1; }
        }

        /* Animações de Estado */
        .shaking { animation: heavyShake 0.1s infinite; }
        .lifting-off { animation: flyUp 2s ease-in forwards; }

        @keyframes heavyShake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(1px, -1px); }
        }

        @keyframes flyUp {
            100% { transform: translateY(-150vh) scale(0.2); opacity: 0; }
        }

        /* Rodapé */
        .signature {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            letter-spacing: 5px;
            opacity: 0.6;
        }
        .signature b { color: #fff; text-shadow: 0 0 5px var(--nasa-blue); }
    </style>
</head>
<body>

    <div class="nebula"></div>
    <div id="stars-field"></div>
    <div class="saturn"></div>

    <div class="hud">
        <div class="data-panel">
            STATUS: READY FOR IGNITION<br>
            COORDINATES: 38.8833° N, 77.0167° W<br>
            MISSION: WASHINGTON-SPACE-X
        </div>
    </div>

    <div class="launch-center" id="stage">
        <div id="countdown"></div>
        <button class="btn-launch" id="mainBtn" onclick="sequence()">LAUNCH</button>
        <div class="fire-trail" id="fire"></div>
    </div>

    <div class="signature">SYS.ENGINEER: <b>WASHINGTON</b></div>

    <script>
        // Gerador de Estrelas Proporcional
        const field = document.getElementById('stars-field');
        for (let i = 0; i < 200; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2.5 + 'px';
            s.style.width = size; s.style.height = size;
            s.style.top = Math.random() * 100 + 'vh';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.setProperty('--d', (Math.random() * 4 + 2) + 's');
            field.appendChild(s);
        }

        function sequence() {
            const btn = document.getElementById('mainBtn');
            const countDiv = document.getElementById('countdown');
            const fire = document.getElementById('fire');
            const stage = document.getElementById('stage');
            
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.5';
            countDiv.style.opacity = '1';
            
            let count = 3;
            const timer = setInterval(() => {
                countDiv.innerHTML = count;
                if(count === 0) {
                    clearInterval(timer);
                    countDiv.innerHTML = "IGNITION";
                    countDiv.style.fontSize = "40px";
                    launch(stage, fire);
                }
                count--;
            }, 1000);
        }

        function launch(stage, fire) {
            stage.classList.add('shaking');
            fire.style.display = 'block';
            
            setTimeout(() => {
                stage.classList.remove('shaking');
                stage.classList.add('lifting-off');
                
                setTimeout(() => {
                    window.location.href = "https://www.nasa.gov";
                }, 1500);
            }, 1500);
        }
    </script>
</body>
</html>
