<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo Espacial</title>
    <style>
        /* Estilização do Fundo Espacial */
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Criando Estrelas com Box-Shadow */
        .stars {
            width: 1px;
            height: 1px;
            background: transparent;
            box-shadow: 10vw 20vh #fff, 30vw 50vh #fff, 70vw 10vh #fff, 85vw 80vh #fff, 40vw 90vh #fff, 15vw 40vh #fff, 60vw 60vh #fff;
            position: absolute;
            top: 0;
            left: 0;
            animation: stars-animation 100s linear infinite;
        }

        /* Órbita e Planeta */
        .solar-system {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Planeta Exemplo (Terra-like) */
        .planet {
            position: absolute;
            top: -10px;
            left: 50%;
            width: 20px;
            height: 20px;
            background: #4facfe;
            border-radius: 50%;
            box-shadow: 0 0 15px #00f2fe;
        }

        /* Animação de Rotação */
        .rotate {
            animation: rotation 15s linear infinite;
        }

        @keyframes rotation {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Estilização do Botão */
        .btn-ola {
            z-index: 10;
            padding: 20px 40px;
            font-size: 24px;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .btn-ola:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.6);
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="solar-system">
        <div class="orbit rotate" style="width: 300px; height: 300px; animation-duration: 10s;">
            <div class="planet" style="background: #ff4e50; width: 15px; height: 15px;"></div>
        </div>
        <div class="orbit rotate" style="width: 500px; height: 500px; animation-duration: 25s;">
            <div class="planet" style="background: #4facfe; width: 25px; height: 25px;"></div>
        </div>
    </div>

    <button class="btn-ola" onclick="alert('Exploração iniciada!')">Olá Mundo</button>

</body>
</html>
