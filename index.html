<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo dos Carros</title>
    <style>
        body {
            background-color: #1a1a1a; /* Fundo asfalto escuro */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* Estilizando o link para não parecer um link comum */
        .link-carro {
            text-decoration: none; /* Remove o sublinhado padrão */
            color: #ff3e3e;        /* Vermelho esportivo */
            font-size: 60px;
            font-weight: bold;
            transition: transform 0.3s, color 0.3s; /* Efeito suave ao passar o mouse */
            cursor: pointer;
            text-shadow: 3px 3px 15px rgba(255, 62, 62, 0.4);
        }

        /* Efeito quando o mouse passa por cima */
        .link-carro:hover {
            color: #ffffff;
            transform: scale(1.1); /* Aumenta um pouquinho de tamanho */
        }

        p {
            margin-top: 20px;
            color: #888;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <a href="https://www.webmotors.com.br" target="_blank" class="link-carro">
        <h1>Olá, Mundo! 🏎️</h1>
    </a>

    <p>CLIQUE NO TEXTO PARA ACELERAR</p>

</body>
</html>
