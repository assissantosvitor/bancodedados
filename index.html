<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Mission Control - Washington</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-bg: #030308;
            --nasa-cyan: #00f2fe;
            --rocket-red: #ff3e3e;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--space-bg);
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        /* Fundo com Nebulosa */
        .nebula {
            position: absolute;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 254, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.08) 0%, transparent 50%);
            z-index: 0;
        }

        /* Estrelas Cadentes */
        .shooting-star {
            position: absolute;
            top: -10px;
            width: 2px; height: 2px;
            background: white;
            box-shadow: 0 0 10px white, 0 0 20px white;
            animation: shoot 5s linear infinite;
            opacity: 0;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0); opacity: 1; }
            10% { transform: translateX(-300px) translateY(300px); opacity: 0; }
            100% { opacity: 0; }
        }

        /* Planeta Terra com Mapa */
        .earth-wrapper {
            position: absolute;
            bottom: -350px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .earth {
            width: 900px;
            height: 900px;
            background: #001d3d url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Solarsystemscope_texture_2k_earth_daymap.jpg/2560px-Solarsystemscope_texture_2k_earth_daymap.jpg');
            background-size: 200% 100%;
            border-radius: 50%;
            box-shadow: 
                inset -30px -30px 60px #000,
                0 0 50px rgba(0, 242, 254, 0.2);
            animation: rotateEarth 120s linear infinite;
            position: relative;
        }

        .earth::after { /* Brilho Atmosférico */
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            box-shadow: inset 10px 10px 30px rgba(255, 255, 255, 0.1);
        }

        @keyframes rotateEarth {
            from { background-position: 0 0; }
            to { background-position: -200% 0; }
        }

        /* Foguete Detalhado */
        .rocket-group {
            position: absolute;
            bottom: 350px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .rocket-body {
            width: 35px;
            height: 85px;
            background: #f0f0f0;
            border-radius: 50% 50% 5px 5px;
            position: relative;
            border-bottom: 4px solid #999;
        }

        .window {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            width: 15px; height: 15px;
            background: #333;
            border: 2px solid var(--nasa-cyan);
            border-radius: 50%;
        }

        .fins {
            position: absolute;
            bottom: 0; width: 60px; height: 30px;
            background: var(--rocket-red);
            z-index: -1;
            clip-path: polygon(0% 100%, 20% 0%, 80% 0%, 100% 100%);
        }

        /* Sistema de Propulsão */
        .exhaust {
            display: none;
            width: 20px;
            height: 70px;
            background: linear-gradient(to bottom, #ff9d00, #ff4e50, transparent);
            filter: blur(4px);
            border-radius: 50%;
            animation: flame-pulse 0.1s infinite alternate;
        }

        @keyframes flame-pulse {
            from { transform: scaleX(1); opacity: 0.8; }
            to { transform: scaleX(1.4); opacity: 1; }
        }

        /* Botão Launch */
        .btn-launch {
            margin-top: 50px;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--nasa-cyan);
            color: var(--nasa-cyan);
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            letter-spacing: 5px;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .btn-launch:hover {
            background: var(--nasa-cyan);
            color: black;
            box-shadow: 0 0 30px var(--nasa-cyan);
        }

        /* Animações de Voo */
        .launch-shake { animation: shake 0.1s infinite; }
        .launch-fly { animation: lift-off 3s ease-in forwards; }

        @keyframes shake {
            0% { transform: translateX(-50%) translate(1px, 1px); }
            50% { transform: translateX(-50%) translate(-1px, -1px); }
        }

        @keyframes lift-off {
            100% { transform: translateX(-50%) translateY(-150vh) scale(0.2); opacity: 0; }
        }

        .credits {
            position: absolute;
            top: 30px; left: 30px;
            font-size: 10px;
            letter-spacing: 3px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="nebula"></div>
    <div id="stars"></div>
    <div class="credits">ENGINEERING BY WASHINGTON // NASA PROTOCOL</div>

    <div class="earth-wrapper">
        <div class="earth"></div>
    </div>

    <div class="rocket-group" id="mainRocket">
        <div class="rocket-body">
            <div class="window"></div>
            <div class="fins"></div>
        </div>
        <div class="exhaust" id="flame"></div>
        
        <button class="btn-launch" id="btnLaunch" onclick="startMission()">DECOLAR</button>
    </div>

    <script>
        // Gerar estrelas e estrelas cadentes
        const starContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star'; // Estilo simples de estrela
            star.style.position = 'absolute';
            star.style.background = 'white';
            star.style.borderRadius = '50%';
            const size = Math.random() * 2 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.opacity = Math.random();
            starContainer.appendChild(star);
        }

        // Criar estrelas cadentes periódicas
        setInterval(() => {
            const ss = document.createElement('div');
            ss.className = 'shooting-star';
            ss.style.left = Math.random() * 100 + 'vw';
            ss.style.top = Math.random() * 50 + 'vh';
            starContainer.appendChild(ss);
            setTimeout(() => ss.remove(), 5000);
        }, 3000);

        function startMission() {
            const rocket = document.getElementById('mainRocket');
            const flame = document.getElementById('flame');
            const btn = document.getElementById('btnLaunch');

            btn.style.opacity = '0';
            btn.style.pointerEvents = 'none';
            flame.style.display = 'block';
            rocket.classList.add('launch-shake');

            setTimeout(() => {
                rocket.classList.remove('launch-shake');
                rocket.classList.add('launch-fly');

                setTimeout(() => {
                    window.location.href = "https://www.nasa.gov";
                }, 2500);
            }, 2000);
        }
    </script>
</body>
</html>
