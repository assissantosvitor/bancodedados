<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Mission Control - Washington</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Orbitron', sans-serif;
            color: #00f2fe;
        }

        /* Estrelas */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* A Terra no fundo */
        .earth {
            position: absolute;
            bottom: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle at 50% 0%, #005f73 0%, #0a1128 70%);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.2), inset 0 20px 40px rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        /* Atmosfera da Terra */
        .atmosphere {
            position: absolute;
            bottom: -160px;
            left: 50%;
            transform: translateX(-50%);
            width: 620px;
            height: 620px;
            border-radius: 50%;
            box-shadow: 0 -20px 60px rgba(0, 242, 254, 0.3);
            z-index: 0;
        }

        /* Container de Lançamento */
        .launch-platform {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        /* O Foguete */
        .rocket-ship {
            font-size: 50px;
            margin-bottom: 10px;
            display: block;
            transition: transform 0.1s;
        }

        .btn-launch {
            padding: 20px 50px;
            font-size: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00f2fe;
            color: #00f2fe;
            cursor: pointer;
            letter-spacing: 5px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .btn-launch:hover {
            background: #00f2fe;
            color: #000;
            box-shadow: 0 0 40px #00f2fe;
        }

        /* Fogo do Foguete */
        .thruster {
            display: none;
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 80px;
            background: linear-gradient(to bottom, #ff4e50, #f9d423, transparent);
            filter: blur(10px);
            border-radius: 50%;
            z-index: -1;
            animation: flame 0.1s infinite alternate;
        }

        /* Animações */
        .igniting { animation: shake 0.1s infinite; }
        .taking-off { animation: flyUp 2.5s ease-in forwards; }

        @keyframes flame {
            from { height: 60px; opacity: 0.8; }
            to { height: 100px; opacity: 1; }
        }

        @keyframes shake {
            0% { transform: translateX(-50%) translate(2px, 2px); }
            50% { transform: translateX(-50%) translate(-2px, -2px); }
        }

        @keyframes flyUp {
            to { transform: translateX(-50%) translateY(-120vh) scale(0.5); opacity: 0; }
        }

        /* Rodapé */
        .dev-info {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 12px;
            letter-spacing: 2px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="stars"></div>
    <div class="atmosphere"></div>
    <div class="earth"></div>

    <div class="launch-platform" id="launchPad">
        <span class="rocket-ship" id="rocketIcon">🚀</span>
        <button class="btn-launch" id="launchBtn" onclick="initiateLaunch()">DECOLAR</button>
        <div class="thruster" id="fire"></div>
    </div>

    <div class="dev-info">CHIEF ENGINEER: <b>WASHINGTON</b></div>

    <script>
        // Gerar estrelas
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
            starsContainer.appendChild(star);
        }

        function initiateLaunch() {
            const pad = document.getElementById('launchPad');
            const fire = document.getElementById('fire');
            const btn = document.getElementById('launchBtn');
            
            btn.innerText = "IGNITION";
            pad.classList.add('igniting');
            fire.style.display = 'block';

            setTimeout(() => {
                pad.classList.remove('igniting');
                pad.classList.add('taking-off');
                
                setTimeout(() => {
                    window.location.href = "https://www.nasa.gov";
                }, 2000);
            }, 1500);
        }
    </script>
</body>
</html>
