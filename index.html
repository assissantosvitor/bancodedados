<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Botão Branco no Preto</title>
  
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacOSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .btn {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 15px rgba(255,255,255,0.12);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255,255,255,0.18);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>

  <button class="btn">CLICAR AQUI</button>

</body>
</html>
